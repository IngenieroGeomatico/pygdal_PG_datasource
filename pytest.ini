[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
; Por defecto se excluyen los tests de integración (recursos externos reales).
; Para ejecutarlos:  pytest -m integration   (o  pytest -m "integration")
addopts = -ra -q -m "not integration"
markers =
    integration: tests que requieren recursos externos reales (red, BD, hardware); desactivados por defecto
